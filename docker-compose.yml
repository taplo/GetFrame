services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: getframe
      MYSQL_USER: getframe
      MYSQL_PASSWORD: getframe
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - getframe-net

  kafka:
    image: confluentinc/cp-kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - getframe-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: getframe
      MINIO_ROOT_PASSWORD: getframe123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - getframe-net

  init-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 getframe getframe123 &&
      /usr/bin/mc mb local/getframe-frames --ignore-existing &&
      echo 'Bucket ready: getframe-frames'
      "
    networks:
      - getframe-net

  init-kafka-topics:
    image: confluentinc/cp-kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      kafka-topics --bootstrap-server kafka:9092 --topic getframe-frames --create --if-not-exists &&
      echo 'Topic ready: getframe-frames'
      "
    networks:
      - getframe-net

  worker:
    image: getframe-worker:latest
    build:
      context: .
      args:
        https_proxy: ""
    depends_on:
      init-bucket:
        condition: service_completed_successfully
      init-kafka-topics:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./config.docker.yaml:/etc/getframe/config.yaml
      - ./samples:/samples
    restart: unless-stopped
    networks:
      - getframe-net

volumes:
  mysqldata:
  miniodata:

networks:
  getframe-net:
    driver: bridge
